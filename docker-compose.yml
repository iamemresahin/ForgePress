services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL
      - QUEUE_URL
      - NEXTAUTH_SECRET
      - NEXTAUTH_URL
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - NODE_ENV=production
    networks:
      - coolify
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_URL
      - QUEUE_URL
      - OPENAI_API_KEY
      - NODE_ENV=production
    networks:
      - coolify
    restart: unless-stopped
    depends_on:
      - web

networks:
  coolify:
    external: true
