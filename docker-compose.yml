services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - QUEUE_URL=${QUEUE_URL}
      - APP_URL=${APP_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-dall-e-3}
      - OPENAI_MODERATION_MODEL=${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      - FORGEPRESS_SESSION_SECRET=${FORGEPRESS_SESSION_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - FORGEPRESS_ADMIN_EMAIL=${FORGEPRESS_ADMIN_EMAIL}
      - FORGEPRESS_ADMIN_PASSWORD=${FORGEPRESS_ADMIN_PASSWORD}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
      - NEXT_TELEMETRY_DISABLED=1
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.gzip.compress=true"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # forgepress.cc → www.forgepress.cc redirect
      - "traefik.http.middlewares.0-rg8k04kwsssco0cs4ok0w8co-to-www.redirectregex.permanent=false"
      - "traefik.http.middlewares.0-rg8k04kwsssco0cs4ok0w8co-to-www.redirectregex.regex=^(http|https)://(?:www\\.)?(.+)"
      - "traefik.http.middlewares.0-rg8k04kwsssco0cs4ok0w8co-to-www.redirectregex.replacement=$${1}://www.$${2}"
      # nocodebuilds.com → www.nocodebuilds.com redirect
      - "traefik.http.middlewares.2-rg8k04kwsssco0cs4ok0w8co-to-www.redirectregex.permanent=false"
      - "traefik.http.middlewares.2-rg8k04kwsssco0cs4ok0w8co-to-www.redirectregex.regex=^(http|https)://(?:www\\.)?(.+)"
      - "traefik.http.middlewares.2-rg8k04kwsssco0cs4ok0w8co-to-www.redirectregex.replacement=$${1}://www.$${2}"
      # HTTP routers
      - "traefik.http.routers.http-0-rg8k04kwsssco0cs4ok0w8co.entryPoints=http"
      - "traefik.http.routers.http-0-rg8k04kwsssco0cs4ok0w8co.middlewares=redirect-to-https"
      - "traefik.http.routers.http-0-rg8k04kwsssco0cs4ok0w8co.rule=Host(`forgepress.cc`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-0-rg8k04kwsssco0cs4ok0w8co.service=http-0-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.http-1-rg8k04kwsssco0cs4ok0w8co.entryPoints=http"
      - "traefik.http.routers.http-1-rg8k04kwsssco0cs4ok0w8co.middlewares=redirect-to-https"
      - "traefik.http.routers.http-1-rg8k04kwsssco0cs4ok0w8co.rule=Host(`www.forgepress.cc`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-1-rg8k04kwsssco0cs4ok0w8co.service=http-1-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.http-2-rg8k04kwsssco0cs4ok0w8co.entryPoints=http"
      - "traefik.http.routers.http-2-rg8k04kwsssco0cs4ok0w8co.middlewares=redirect-to-https"
      - "traefik.http.routers.http-2-rg8k04kwsssco0cs4ok0w8co.rule=Host(`nocodebuilds.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-2-rg8k04kwsssco0cs4ok0w8co.service=http-2-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.http-3-rg8k04kwsssco0cs4ok0w8co.entryPoints=http"
      - "traefik.http.routers.http-3-rg8k04kwsssco0cs4ok0w8co.middlewares=redirect-to-https"
      - "traefik.http.routers.http-3-rg8k04kwsssco0cs4ok0w8co.rule=Host(`www.nocodebuilds.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.http-3-rg8k04kwsssco0cs4ok0w8co.service=http-3-rg8k04kwsssco0cs4ok0w8co"
      # HTTPS routers
      - "traefik.http.routers.https-0-rg8k04kwsssco0cs4ok0w8co.entryPoints=https"
      - "traefik.http.routers.https-0-rg8k04kwsssco0cs4ok0w8co.middlewares=gzip,0-rg8k04kwsssco0cs4ok0w8co-to-www"
      - "traefik.http.routers.https-0-rg8k04kwsssco0cs4ok0w8co.rule=Host(`forgepress.cc`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-0-rg8k04kwsssco0cs4ok0w8co.service=https-0-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.https-0-rg8k04kwsssco0cs4ok0w8co.tls=true"
      - "traefik.http.routers.https-0-rg8k04kwsssco0cs4ok0w8co.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-1-rg8k04kwsssco0cs4ok0w8co.entryPoints=https"
      - "traefik.http.routers.https-1-rg8k04kwsssco0cs4ok0w8co.middlewares=gzip"
      - "traefik.http.routers.https-1-rg8k04kwsssco0cs4ok0w8co.rule=Host(`www.forgepress.cc`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-1-rg8k04kwsssco0cs4ok0w8co.service=https-1-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.https-1-rg8k04kwsssco0cs4ok0w8co.tls=true"
      - "traefik.http.routers.https-1-rg8k04kwsssco0cs4ok0w8co.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-2-rg8k04kwsssco0cs4ok0w8co.entryPoints=https"
      - "traefik.http.routers.https-2-rg8k04kwsssco0cs4ok0w8co.middlewares=gzip,2-rg8k04kwsssco0cs4ok0w8co-to-www"
      - "traefik.http.routers.https-2-rg8k04kwsssco0cs4ok0w8co.rule=Host(`nocodebuilds.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-2-rg8k04kwsssco0cs4ok0w8co.service=https-2-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.https-2-rg8k04kwsssco0cs4ok0w8co.tls=true"
      - "traefik.http.routers.https-2-rg8k04kwsssco0cs4ok0w8co.tls.certresolver=letsencrypt"
      - "traefik.http.routers.https-3-rg8k04kwsssco0cs4ok0w8co.entryPoints=https"
      - "traefik.http.routers.https-3-rg8k04kwsssco0cs4ok0w8co.middlewares=gzip"
      - "traefik.http.routers.https-3-rg8k04kwsssco0cs4ok0w8co.rule=Host(`www.nocodebuilds.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.https-3-rg8k04kwsssco0cs4ok0w8co.service=https-3-rg8k04kwsssco0cs4ok0w8co"
      - "traefik.http.routers.https-3-rg8k04kwsssco0cs4ok0w8co.tls=true"
      - "traefik.http.routers.https-3-rg8k04kwsssco0cs4ok0w8co.tls.certresolver=letsencrypt"
      # Load balancer ports
      - "traefik.http.services.http-0-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.http-1-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.http-2-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.http-3-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.https-0-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.https-1-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.https-2-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      - "traefik.http.services.https-3-rg8k04kwsssco0cs4ok0w8co.loadbalancer.server.port=3000"
      # Coolify metadata
      - "coolify.managed=true"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - QUEUE_URL=${QUEUE_URL}
      - APP_URL=${APP_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_TEXT_MODEL=${OPENAI_TEXT_MODEL:-gpt-4o-mini}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-dall-e-3}
      - OPENAI_MODERATION_MODEL=${OPENAI_MODERATION_MODEL:-omni-moderation-latest}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
    networks:
      - coolify

networks:
  coolify:
    external: true
